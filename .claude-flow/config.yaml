# RuFlo V3 Runtime Configuration
# Generated: 2026-04-13T04:22:01.969Z

version: "3.0.0"

swarm:
  topology: hierarchical-mesh
  maxAgents: 15
  autoScale: true
  coordinationStrategy: consensus

memory:
  backend: hybrid
  enableHNSW: true
  persistPath: .claude-flow/data
  cacheSize: 100
  # ADR-049: Self-Learning Memory
  learningBridge:
    enabled: true
    sonaMode: balanced
    confidenceDecayRate: 0.005
    accessBoostAmount: 0.03
    consolidationThreshold: 10
  memoryGraph:
    enabled: true
    pageRankDamping: 0.85
    maxNodes: 5000
    similarityThreshold: 0.8
  agentScopes:
    enabled: true
    defaultScope: project

neural:
  enabled: true
  modelPath: .claude-flow/neural

hooks:
  enabled: true
  autoExecute: true

mcp:
  autoStart: false
  port: 3000

# ADR-026: 3-Tier Model Routing
modelRouting:
  enabled: true
  tiers:
    # Tier 1: WASM Agent Booster — trivial transforms, no LLM
    wasm:
      model: wasm-agent-booster
      cost: "$0"
      latency: "<1ms"
      triggers:
        - rename
        - reformat
        - fix typo
        - add type annotation
        - var to const
    # Tier 2: Haiku — fast, cheap for standard tasks
    haiku:
      model: claude-haiku-4-5-20251001
      cost: "$0.0002"
      latency: "~500ms"
      triggers:
        - create
        - add
        - implement
        - build
        - fix
        - update
    # Tier 3: Sonnet — complex reasoning, planning, review
    sonnet:
      model: claude-sonnet-4-6
      cost: "$0.003-0.015"
      latency: "2-5s"
      triggers:
        - design
        - architect
        - plan
        - security
        - performance
        - review
        - analyze
        - refactor
        - complex
  default: haiku
  autoEscalate: true
