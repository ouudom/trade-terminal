<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#131A1C"/>

  <!-- Candlestick wick left -->
  <line x1="8" y1="18" x2="8" y2="16" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="8" y2="26" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick body left -->
  <rect x="5.5" y="16" width="5" height="8" rx="1.2" fill="#4DD9C7" fill-opacity="0.45"/>

  <!-- Candlestick wick middle -->
  <line x1="16" y1="12" x2="16" y2="10" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="16" y2="24" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick body middle -->
  <rect x="13.5" y="12" width="5" height="10" rx="1.2" fill="#4DD9C7"/>

  <!-- Candlestick wick right -->
  <line x1="24" y1="7" x2="24" y2="5" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="18" x2="24" y2="20" stroke="#4DD9C7" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Candlestick body right (tallest) -->
  <rect x="21.5" y="7" width="5" height="11" rx="1.2" fill="#4DD9C7"/>

  <!-- Uptrend dashed line -->
  <polyline points="7,22 15,16 23,10" stroke="#4DD9C7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="2 2" opacity="0.5"/>
</svg>
